<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="Vp.css">
     <link rel="shortcut icon" href="images/Vz.jpg" type="image/x-icon">
     <script src="vp.js" defer></script>
     
    <title>Video Player</title>
</head>
<body>
                    <!--////////////////////////////////////// Video Player Code//////////////////////////////////////////////////////// -->

                    <div id="screendiv">
                        
                        <video id="screen" data-volume-level="high">
                            <source src="https://drive.google.com/uc?id=17fX93QQMP7njPQOnDocSz2VIwqGGJq8P" type="video/mp4">
                            
                        </video>
                        <div id="controls">
                                <div id="back" title="Seek Backward">⏪</div>
                                <div id="play" style="display:block;" title="Play"><strong>▶</strong></div>
                                <div id="pause" style="display:none;" title="Pause">⏸</div>
                                <div id="forward" title="Seek Forward">⏩</div>
                                <div id="timer">
                                    <div class="currtime">00:00</div>
                                        /
                                    <div class="totaltime">00:00</div>
                                </div>
                                <progress id="seekbar" min="0"><span id="progress"></span></progress>
                                <div id="minip" style="display:block;" title="Click to go in Picture in Picture Mode"> <strong>◲</strong></div>
                                <div id="fullscr" style="display:block;"title="Click for Fullscreen Mode"><strong>↔</strong></div>
                                <div id="volumectrl">
                                    <div id="volvalue" style="display:block" title="Click to Mute">
                                        😁
                                    </div>
                                    <div id="mute" style="display:none" title="Click to Unmute">
                                        🤐
                                    </div>
                                    <input type="range" min="0" max="1" steps="0.01" value="1" id="volslider" title="Volume">
                                </div>
                            
                        </div>
                    </div>


                    <!-- /////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
</body>
</html>
